name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Per docs/pinned-versions.md. Node 22 is the current LTS line; pnpm 11.3.0
  # requires Node 22.13+ (uses node:sqlite, a Node 22 builtin). Brief §5 floor
  # is Node ≥ 20 (the "+" accepts higher).
  NODE_VERSION: "22"
  PNPM_VERSION: "11.3.0"

jobs:
  # ─── JS / TS workspace ───────────────────────────────────────────
  js-checks:
    name: JS — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Format check
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # ─── Rust workspace ──────────────────────────────────────────────
  rust-checks:
    name: Rust — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux deps. Skipped on non-Linux.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build (debug)
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # ─── Summary job — required for branch protection ────────────────
  ci-pass:
    name: CI Pass
    needs: [js-checks, rust-checks]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.js-checks.result }}" != "success" ] || \
             [ "${{ needs.rust-checks.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
