name: Release Bundles

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.0.1)"
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.3.0"
  TAURI_VERSION: "0.0.1"

jobs:
  # ─── macOS DMG ─────────────────────────────────────────────────────
  build-dmg:
    name: macOS DMG — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri (release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "4neverCompany OS ${{ github.ref_name }}"
          releaseBody: |
            See https://github.com/Code4neverCompany/4neverCompanyOS/releases
          releaseDraft: true
          prerelease: false
          args: --bundles dmg

  # ─── Linux AppImage ─────────────────────────────────────────────────
  build-appimage:
    name: Linux AppImage — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri (release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "4neverCompany OS ${{ github.ref_name }}"
          releaseBody: |
            See https://github.com/Code4neverCompany/4neverCompanyOS/releases
          releaseDraft: true
          prerelease: false
          args: --bundles appimage

  # ─── Windows NSIS ──────────────────────────────────────────────────
  build-nsis:
    name: Windows NSIS — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri (release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "4neverCompany OS ${{ github.ref_name }}"
          releaseBody: |
            See https://github.com/Code4neverCompany/4neverCompanyOS/releases
          releaseDraft: true
          prerelease: false
          args: --bundles nsis
