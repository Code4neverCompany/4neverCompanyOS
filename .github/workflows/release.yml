name: Release Bundles

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.0.1)"
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "11.3.0"

jobs:
  # ─── macOS DMG ─────────────────────────────────────────────────────
  build-dmg:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri
        run: |
          pnpm --filter @c4n/desktop tauri build --bundles dmg 2>&1
          echo "--- Artifacts ---"
          find target/release/bundle -type f 2>&1 || dir /s target\release\bundle 2>&1

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/release/bundle/macos/*.tar.gz
          retention-days: 5

  # ─── Linux AppImage ─────────────────────────────────────────────────
  build-appimage:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri
        run: |
          pnpm --filter @c4n/desktop tauri build --bundles appimage 2>&1
          echo "--- Artifacts ---"
          find target/release/bundle -type f 2>&1

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: target/release/bundle/appimage/*.AppImage.tar.gz
          retention-days: 5

  # ─── Windows NSIS ──────────────────────────────────────────────────
  build-nsis:
    name: Windows NSIS
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri
        shell: pwsh
        run: |
          pnpm --filter @c4n/desktop tauri build --bundles nsis 2>&1
          echo "--- Artifacts ---"
          Get-ChildItem -Recurse target/release/bundle -File | Select-Object FullName

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: target/release/bundle/nsis/*.exe
          retention-days: 5

  # ─── Create Release ─────────────────────────────────────────────────
  create-release:
    name: Create Draft Release
    needs: [build-dmg, build-appimage, build-nsis]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          find artifacts -type f -name "*.tar.gz" -o -name "*.exe" | while read f; do
            echo "$f"
          done

      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          TAG_NAME="${VERSION#v}"

          # Create release via GitHub CLI
          gh release create "${VERSION}" \
            --title "4neverCompany OS ${VERSION}" \
            --notes "See https://github.com/Code4neverCompany/4neverCompanyOS/releases" \
            --draft \
            artifacts/*/4neverCompany*.tar.gz \
            artifacts/*/*setup*.exe 2>&1 || echo "Release create may have partial failure"

      - name: Verify release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          gh release view "${VERSION}" --json tagName,url,draft,assets 2>&1
